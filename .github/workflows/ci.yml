name: dotnet-ci

on:
  pull_request:
    branches:
      - '**'

jobs:

  build:
    name: dotnet-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x
            3.1.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    name: dotnet-test-netcore31
    runs-on: ubuntu-latest
    needs: build

    container:
      image: mcr.microsoft.com/dotnet/core/sdk:3.1

    steps:
      - uses: actions/checkout@v4

      - name: Test netcoreapp3.1
        run: |
          dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --filter "FullyQualifiedName!~Benchmark"

          dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --filter "FullyQualifiedName!~Benchmark"

      - name: Test netcoreapp3.1 with coverage
        run: |
          dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName!~Benchmark"

          dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName!~Benchmark"

      - name: Upload coverage netcoreapp3.1
        uses: actions/upload-artifact@v4
        with:
          name: coverage-netcore31
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: error

  test-modern:
    name: dotnet-test-modern
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x

      - name: Run tests (modern frameworks)
        run: |
          for framework in net6.0 net8.0 net10.0
          do
            dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --filter "FullyQualifiedName!~Benchmark"

            dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --filter "FullyQualifiedName!~Benchmark"
          done

      - name: Upload coverage modern
        uses: actions/upload-artifact@v4
        with:
          name: coverage-modern
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: error

  pack:
    name: dotnet-pack
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x
            3.1.x

      - name: Restore src projects
        run: |
          dotnet restore src/Hydrix/Hydrix.csproj --configuration Release
          dotnet restore src/Hydrix.Mapper/Hydrix.Mapper.csproj --configuration Release

      - name: Build src projects
        run: |
          dotnet build src/Hydrix/Hydrix.csproj --no-restore --configuration Release
          dotnet build src/Hydrix.Mapper/Hydrix.Mapper.csproj --no-restore --configuration Release

      - name: Pack projects (src only)
        run: |
          dotnet pack src/Hydrix/Hydrix.csproj --no-build --no-restore --configuration Release
          dotnet pack src/Hydrix.Mapper/Hydrix.Mapper.csproj --no-build --no-restore --configuration Release

