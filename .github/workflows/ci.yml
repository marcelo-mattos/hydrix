name: dotnet-ci

on:
  pull_request:
    branches:
      - '**'

jobs:

  build:
    name: dotnet-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test-netcore31:
    name: test-netcoreapp3.1
    runs-on: ubuntu-20.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 3.1.x

      - name: Restore
        run: dotnet restore

      - name: Build (3.1)
        run: dotnet build --configuration Release --framework netcoreapp3.1

      - name: Test (3.1)
        run: |
          dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --no-build

          dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
            --framework netcoreapp3.1 \
            --configuration Release \
            --no-build

  test:
    name: dotnet-test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x

      - name: Run tests with coverage
        run: |
          for framework in net6.0 net8.0 net10.0
          do
            dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --results-directory ./TestResults

            dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --results-directory ./TestResults
          done

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'
          if-no-files-found: error

  sonar:
    name: sonar-quality-gate
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x
            6.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Sonar Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        run: |
          dotnet sonarscanner begin \
            /k:"marcelo-mattos_hydrix" \
            /o:"marcelo-mattos" \
            /d:sonar.login="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="coverage/**/coverage.cobertura.xml" \
            /d:sonar.pullrequest.key="$PR_NUMBER" \
            /d:sonar.pullrequest.branch="$PR_BRANCH" \
            /d:sonar.pullrequest.base="$PR_BASE"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: |
          for framework in net6.0 net8.0 net10.0
          do
            dotnet test tests/Hydrix.UnitTests/Hydrix.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --no-build \
              --collect:"XPlat Code Coverage" \
              --results-directory ./TestResults

            dotnet test tests/Hydrix.Mapper.UnitTests/Hydrix.Mapper.UnitTests.csproj \
              --framework $framework \
              --configuration Release \
              --no-build \
              --collect:"XPlat Code Coverage" \
              --results-directory ./TestResults
          done

      - name: Sonar End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"
